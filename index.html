<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Generator</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <main>
      <div class="container">
        <div class="title-container">
          <h1>🎲 Password Generator 🎲</h1>
          <p>Generate strong unique passwords</p>
        </div>

        <!-- Password Container -->
        <div class="password-container">
          <input
            type="text"
            class="input"
            id="password"
            value=""
            placeholder="Generate Random Password"
            readonly
          />

          <!-- Passwrord Refresh & Copy Password Buttons -->
          <div class="btn-wrapper">
            <button class="btn" id="copy-btn">
              <i class="fa-regular fa-copy"></i>
            </button>
            <button class="btn" id="generate-btn">
              <i class="fa-solid fa-arrows-rotate"></i>
            </button>
          </div>
        </div>

        <!-- Password Strength -->
        <div class="strength-container">
          <h3 id="strength-label">How strong is my password?</h3>
        </div>

        <!-- Other Input Options  -->
        <div class="options">
          <!-- Slider Password Length -->
          <div class="options">
            <div class="pass-length">
              <label for="length">Password length: </label>
              <span id="length-value">12</span>
            </div>
            <input
              type="range"
              min="6"
              max="24"
              value="12"
              class="input-slider"
              id="length"
            />
          </div>

          <!-- Include Uppercase Letters -->
          <div class="option">
            <p>🔠 - Include Uppercase Letters</p>
            <label class="switch">
              <input type="checkbox" id="uppercase" />
              <span class="slider round"></span>
            </label>
          </div>

          <!-- Include Lowercase Letters -->
          <div class="option">
            <p>🔡 - Include Lowercase Letters</p>
            <label class="switch">
              <input type="checkbox" id="lowercase" checked />
              <span class="slider round"></span>
            </label>
          </div>

          <!-- Include Numbers -->
          <div class="option">
            <p>🔢 - Include Numbers</p>
            <label class="switch">
              <input type="checkbox" id="numbers" />
              <span class="slider round"></span>
            </label>
          </div>

          <!-- Include Symbols -->
          <div class="option">
            <p>🔣 - Include Symbols</p>
            <label class="switch">
              <input type="checkbox" id="symbols" />
              <span class="slider round"></span>
            </label>
          </div>
        </div>
      </div>
      <div class="alert-container active">Password Copied</div>
    </main>
  </body>
</html>
